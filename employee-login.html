<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Login | SakhiHub</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-card {
            max-width: 450px;
            margin: 150px auto;
            padding: 3rem;
            text-align: center;
        }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        input { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 10px; }
    </style>
</head>
<body style="background: var(--bg-light);">

    <nav id="navbar" class="scrolled">
        <div class="logo">
            <img src="assets/branding/logo_icon.jpg" alt="Sakhi Hub Logo" style="height: 45px; border-radius: 50%;"> <span>SAKHI HUB</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="employee-registration.html">Register</a></li>
        </ul>
    </nav>

    <div class="login-card glass">
        <h2 style="margin-bottom: 0.5rem;">Employee Login</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Access your dashboard to manage field work.</p>

        <form id="loginForm">
            <div class="form-group">
                <label>Mobile Number / Employee ID</label>
                <input type="text" name="identifier" required placeholder="Enter mobile or SKH ID">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required placeholder="Enter your password">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Login Now</button>
        </form>

        <div style="margin-top: 2rem;">
            <p>New employee? <a href="employee-registration.html" style="color: var(--primary); font-weight: 600;">Apply for Registration</a></p>
        </div>
        
        <div style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #eee; font-size: 0.9rem; color: #888;">
            <p>Demo Login: 8076611842 / admin (Super Admin)</p>
        </div>
    </div>

    <script type="module">
        import { auth } from './js/auth.js';

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const identifier = e.target.identifier.value;
            const password = e.target.password.value;

            try {
                const user = auth.login(identifier, password);
                
                // Redirect based on role
                if (user.role === 'Admin') {
                    window.location.href = 'admin/index.html';
                } else if (user.role === 'District Coordinator') {
                    window.location.href = 'coordinator/dashboard.html';
                } else {
                    window.location.href = 'employee/dashboard.html';
                }
            } catch (err) {
                alert(err.message);
            }
        });
    </script>
</body>
</html>
