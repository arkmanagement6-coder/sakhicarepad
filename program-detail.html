<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Program Details | Sakhi Hub</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav id="navbar" class="scrolled">
        <div class="logo">
            <img src="assets/branding/logo_icon.jpg" alt="Sakhi Hub Logo" style="height: 40px; border-radius: 50%;"> SAKHI HUB
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="programs.html">Programs</a></li>
            <li><a href="products.html">Products</a></li>
            <li><a href="network.html">Network</a></li>
            <li><a href="hiring.html">Join Us</a></li>
        </ul>
        <a href="hiring.html" class="btn btn-primary">Join Mission</a>
    </nav>

    <div id="content">
        <!-- Dynamically loaded -->
    </div>

    <footer style="margin-top: 5rem;">
        <div class="container">
            <div class="footer-grid">
                    <div class="logo" style="color: var(--white); margin-bottom: 1.5rem;">
                        <img src="assets/branding/logo_icon.jpg" alt="Sakhi Hub Logo" style="height: 40px; border-radius: 50%; filter: brightness(10);"> SAKHI HUB
                    </div>
                    <p style="color: #ccc;">Empowering women through health, education, and economic independence.</p>
            </div>
        </div>
    </footer>

    <script type="module">
        import { db } from './js/db.js';

        const urlParams = new URLSearchParams(window.location.search);
        const programId = urlParams.get('id');
        const program = db.getProgramById(programId);

        if (!program) {
            window.location.href = 'programs.html';
        }

        const content = document.getElementById('content');
        document.title = `${program.title} | Sakhi Care`;

        content.innerHTML = `
            <header class="section-padding" style="background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('${program.image}'); background-size: cover; background-position: center; color: white; margin-top: 80px; text-align: center;">
                <div class="container">
                    <span style="background: var(--primary); padding: 0.5rem 1.5rem; border-radius: 50px; font-size: 0.9rem; font-weight: 600;">${program.category}</span>
                    <h1 style="font-size: 4rem; margin-top: 1.5rem;">${program.title}</h1>
                </div>
            </header>

            <section class="section-padding">
                <div class="container">
                    <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 4rem; flex-wrap: wrap;">
                        <div>
                            <div style="margin-bottom: 3rem;">
                                <h2 style="font-size: 2rem; margin-bottom: 1rem; color: var(--primary);">About the Program</h2>
                                <p style="font-size: 1.1rem; color: var(--text-dark); line-height: 1.8;">${program.content.about}</p>
                            </div>

                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 3rem;">
                                <div class="glass" style="padding: 2rem; border-radius: 20px;">
                                    <h3 style="color: #e53935; margin-bottom: 1rem;"><i class="fas fa-exclamation-triangle"></i> The Problem</h3>
                                    <p>${program.content.problem}</p>
                                </div>
                                <div class="glass" style="padding: 2rem; border-radius: 20px;">
                                    <h3 style="color: var(--secondary); margin-bottom: 1rem;"><i class="fas fa-lightbulb"></i> Our Solution</h3>
                                    <p>${program.content.solution}</p>
                                </div>
                            </div>

                            <div>
                                <h2 style="font-size: 2rem; margin-bottom: 1.5rem; color: var(--primary);">Key Activities</h2>
                                <ul style="list-style: none;">
                                    ${program.content.activities.map(a => `
                                        <li style="margin-bottom: 1rem; display: flex; align-items: center; gap: 1rem; font-size: 1.1rem;">
                                            <i class="fas fa-check-circle" style="color: var(--secondary);"></i> ${a}
                                        </li>
                                    `).join('')}
                                </ul>
                            </div>
                        </div>

                        <div style="position: sticky; top: 120px; height: fit-content;">
                            <div class="glass" style="padding: 2.5rem; border-radius: 30px; text-align: center; border: 2px solid var(--primary-light);">
                                <h3 style="margin-bottom: 1rem;">Ready to Join?</h3>
                                <p style="margin-bottom: 2rem; color: var(--text-muted);">Become a part of this campaign and help us reach more women.</p>
                                <a href="hiring.html" class="btn btn-primary" style="width: 100%;">Join Program</a>
                                <div style="margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
                                    <i class="fab fa-whatsapp"></i> Inquiry: +91 8821885577
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        `;
    </script>
</body>
</html>
