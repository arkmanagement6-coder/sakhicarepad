<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Registration | SakhiHub</title>
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .reg-container {
            max-width: 800px;
            margin: 120px auto;
            padding: 3rem;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
        }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #444; }
        input, select, textarea {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
        }
        .full-width { grid-column: 1 / -1; }
    </style>
</head>
<body style="background: var(--bg-light);">

    <nav id="navbar" class="scrolled">
        <div class="logo">
            <img src="assets/branding/logo_icon.jpg" alt="Sakhi Hub Logo" style="height: 45px; border-radius: 50%;"> <span>SAKHI HUB</span>
        </div>
        <div class="menu-toggle" id="mobile-menu"><i class="fas fa-bars"></i></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <a href="employee-login.html" class="btn btn-outline nav-btn">Login</a>
    </nav>

    <div class="reg-container glass">
        <h1 style="margin-bottom: 1rem; text-align: center;">Join the SakhiHub Team</h1>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 3rem;">Become a part of our mission to empower women across India.</p>

        <form id="registrationForm">
            <div class="form-grid">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" name="name" required placeholder="Enter full name">
                </div>
                <div class="form-group">
                    <label>Mobile Number *</label>
                    <input type="tel" name="mobile" required placeholder="10-digit number">
                </div>
                <div class="form-group">
                    <label>WhatsApp Number *</label>
                    <input type="tel" name="whatsapp" required placeholder="WhatsApp number">
                </div>
                <div class="form-group">
                    <label>Email (Optional)</label>
                    <input type="email" name="email" placeholder="email@example.com">
                </div>
                <div class="form-group">
                    <label>Gender *</label>
                    <select name="gender" required>
                        <option value="">Select Gender</option>
                        <option value="Female">Female</option>
                        <option value="Male">Male</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Apply For *</label>
                    <select name="role" required>
                        <option value="">Select Position</option>
                        <option value="Block Employee">Block Level Employee</option>
                        <option value="District Coordinator">District Coordinator</option>
                        <option value="Volunteer">Volunteer</option>
                        <option value="Delivery Partner">Delivery Partner</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>State *</label>
                    <input type="text" name="state" required placeholder="e.g. Uttar Pradesh">
                </div>
                <div class="form-group">
                    <label>District *</label>
                    <input type="text" name="district" required placeholder="e.g. Agra">
                </div>
                <div class="form-group">
                    <label>Tehsil / Block *</label>
                    <input type="text" name="block" required placeholder="Enter block name">
                </div>
                <div class="form-group">
                    <label>Village / Area *</label>
                    <input type="text" name="village" required placeholder="Enter village or area">
                </div>

                <div class="form-group full-width">
                    <label>Full Address *</label>
                    <textarea name="address" rows="3" required placeholder="Enter complete address"></textarea>
                </div>

                <div class="form-group">
                    <label>Qualification *</label>
                    <input type="text" name="qualification" required placeholder="e.g. Graduate">
                </div>
                <div class="form-group">
                    <label>Experience</label>
                    <input type="text" name="experience" placeholder="e.g. 2 years in NGO">
                </div>
                <div class="form-group">
                    <label>Aadhaar Number</label>
                    <input type="text" name="aadhaar" placeholder="12-digit number">
                </div>
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" name="password" required placeholder="Create password">
                </div>

                <div class="form-group full-width">
                    <label style="display: flex; align-items: center; gap: 0.5rem; font-weight: normal; cursor: pointer;">
                        <input type="checkbox" required style="width: auto;"> I agree to the terms and conditions of SakhiHub.
                    </label>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 1rem;">Submit Registration</button>
        </form>
    </div>

    <script type="module">
        import { db } from './js/db.js';

        document.getElementById('registrationForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            try {
                // Check if mobile already exists
                const existing = db.getUsers().find(u => u.mobile === data.mobile);
                if (existing) {
                    alert('This mobile number is already registered.');
                    return;
                }

                db.addUser({
                    ...data,
                    status: 'Pending'
                });

                alert('Registration successful! Your account is pending approval by Admin. You will be notified once activated.');
                window.location.href = 'index.html';
            } catch (err) {
                alert('Error: ' + err.message);
            }
        });
    </script>
<script src="js/main.js"></script>
</body>
</html>
