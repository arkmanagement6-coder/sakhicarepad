<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Sakhi Care</title>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            background: #f0f2f5;
        }
        .sidebar {
            width: 280px;
            height: 100vh;
            background: #1a1a1a;
            color: white;
            padding: 2rem;
            position: fixed;
        }
        .main-content {
            margin-left: 280px;
            width: calc(100% - 280px);
            padding: 3rem;
        }
        .sidebar-links {
            list-style: none;
            margin-top: 3rem;
        }
        .sidebar-links li {
            margin-bottom: 1rem;
        }
        .sidebar-links a {
            color: #ccc;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            transition: var(--trans);
        }
        .sidebar-links a:hover, .sidebar-links a.active {
            background: var(--primary);
            color: white;
        }
        .stat-card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: var(--shadow-sm);
            text-align: center;
        }
        .stat-card h3 {
            font-size: 2.5rem;
            color: var(--primary);
        }
        .stat-card p {
            color: var(--text-muted);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo" style="color: white;"><i class="fas fa-heart"></i> SAKHI ADMIN</div>
        <ul class="sidebar-links">
            <li><a href="index.html" class="active"><i class="fas fa-chart-line"></i> Dashboard</a></li>
            <li><a href="programs.html"><i class="fas fa-tasks"></i> Programs</a></li>
            <li><a href="applications.html"><i class="fas fa-user-tie"></i> Applications</a></li>
            <li><a href="groups.html"><i class="fas fa-users"></i> Groups</a></li>
            <li><a href="products.html"><i class="fas fa-box"></i> Products</a></li>
            <li><a href="cms.html"><i class="fas fa-edit"></i> CMS</a></li>
            <li><a href="../index.html" target="_blank"><i class="fas fa-external-link-alt"></i> View Site</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem;">
            <h1>Admin Dashboard</h1>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <span>Welcome, <strong>Super Admin</strong></span>
                <div style="width: 40px; height: 40px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white;"><i class="fas fa-user"></i></div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 2rem; margin-bottom: 4rem;">
            <div class="stat-card">
                <h3 id="stat-users">10.2k</h3>
                <p>Total Users</p>
            </div>
            <div class="stat-card">
                <h3 id="stat-programs">5</h3>
                <p>Active Programs</p>
            </div>
            <div class="stat-card">
                <h3 id="stat-apps">24</h3>
                <p>New Applicants</p>
            </div>
            <div class="stat-card">
                <h3 id="stat-groups">450</h3>
                <p>Total Groups</p>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem;">
            <div class="glass" style="padding: 2rem; border-radius: 20px;">
                <h2 style="margin-bottom: 1.5rem;">Recent Applications</h2>
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="text-align: left; border-bottom: 2px solid #eee;">
                            <th style="padding: 1rem;">Name</th>
                            <th style="padding: 1rem;">Role</th>
                            <th style="padding: 1rem;">Status</th>
                            <th style="padding: 1rem;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="recent-apps-table">
                        <!-- Loaded via JS -->
                    </tbody>
                </table>
            </div>
            <div class="glass" style="padding: 2rem; border-radius: 20px;">
                <h2 style="margin-bottom: 1.5rem;">Program Stats</h2>
                <div id="program-list-stats">
                    <!-- Loaded via JS -->
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { db } from '../js/db.js';

        // Load Stats
        const programs = db.getPrograms();
        const apps = db.getApplications();
        
        document.getElementById('stat-programs').innerText = programs.length;
        document.getElementById('stat-apps').innerText = apps.length || 0;

        // Load Recent Apps
        const tableBody = document.getElementById('recent-apps-table');
        apps.slice(-5).reverse().forEach(app => {
            const tr = document.createElement('tr');
            tr.style.borderBottom = '1px solid #eee';
            tr.innerHTML = `
                <td style="padding: 1rem;">${app.name}</td>
                <td style="padding: 1rem;">${app.role}</td>
                <td style="padding: 1rem;"><span style="background: #fff3e0; color: #ef6c00; padding: 0.3rem 0.8rem; border-radius: 50px; font-size: 0.8rem;">${app.status}</span></td>
                <td style="padding: 1rem;"><a href="applications.html" style="color: var(--primary);">View</a></td>
            `;
            tableBody.appendChild(tr);
        });

        if (apps.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="4" style="padding: 2rem; text-align: center; color: #999;">No applications yet</td></tr>';
        }

        // Program Stats
        const progStats = document.getElementById('program-list-stats');
        programs.forEach(p => {
            const div = document.createElement('div');
            div.style.marginBottom = '1.5rem';
            div.innerHTML = `
                <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                    <span>${p.title}</span>
                    <span style="font-weight: 700;">${p.status}</span>
                </div>
                <div style="width: 100%; height: 8px; background: #eee; border-radius: 10px;">
                    <div style="width: 80%; height: 100%; background: var(--primary); border-radius: 10px;"></div>
                </div>
            `;
            progStats.appendChild(div);
        });
    </script>
</body>
</html>
