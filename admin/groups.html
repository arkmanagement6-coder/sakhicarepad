<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Groups | Sakhi Hub Admin</title>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { display: flex; background: #f0f2f5; }
        .sidebar { width: 280px; height: 100vh; background: #1a1a1a; color: white; padding: 2rem; position: fixed; }
        .main-content { margin-left: 280px; width: calc(100% - 280px); padding: 3rem; }
        .sidebar-links { list-style: none; margin-top: 3rem; }
        .sidebar-links a { color: #ccc; text-decoration: none; display: flex; align-items: center; gap: 1rem; padding: 0.8rem 1rem; border-radius: 10px; }
        .sidebar-links a.active { background: var(--primary); color: white; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo"><img src="../assets/branding/logo_icon.jpg" alt="Sakhi Hub Logo" style="height: 35px; border-radius: 50%; filter: brightness(1.2%;"> SAKHI HUB</div>
        <ul class="sidebar-links">
            <li><a href="index.html"><i class="fas fa-chart-line"></i> Dashboard</a></li>
            <li><a href="programs.html"><i class="fas fa-tasks"></i> Programs</a></li>
            <li><a href="applications.html"><i class="fas fa-user-tie"></i> Applications</a></li>
            <li><a href="groups.html" class="active"><i class="fas fa-users"></i> Groups</a></li>
            <li><a href="products.html"><i class="fas fa-box"></i> Products</a></li>
        </ul>
    </div>
    <div class="main-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem;">
            <h1>Global Group Management</h1>
            <button class="btn btn-primary" onclick="alert('Admin can create groups globally. Coming soon.')"><i class="fas fa-plus"></i> Create New Group</button>
        </div>
        <div class="glass" style="padding: 2rem; border-radius: 20px; background: white;">
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="text-align: left; border-bottom: 2px solid #eee;">
                        <th style="padding: 1rem;">Group Name</th>
                        <th style="padding: 1rem;">Location</th>
                        <th style="padding: 1rem;">Employee / District</th>
                        <th style="padding: 1rem;">Members</th>
                        <th style="padding: 1rem;">Leader</th>
                    </tr>
                </thead>
                <tbody id="gTableBody">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { db } from '../js/db.js';
        import { auth } from '../js/auth.js';

        auth.checkAccess(['Admin']);
        const tableBody = document.getElementById('gTableBody');

        function loadGroups() {
            const groups = db.getGroups();
            const users = db.getUsers();
            
            tableBody.innerHTML = '';
            groups.forEach(g => {
                const emp = users.find(u => u.id === g.createdBy);
                const tr = document.createElement('tr');
                tr.style.borderBottom = '1px solid #eee';
                
                tr.innerHTML = `
                    <td style="padding: 1rem;"><strong>${g.name}</strong></td>
                    <td style="padding: 1rem;">${g.village}, ${g.block}</td>
                    <td style="padding: 1rem;">${emp ? emp.name : 'N/A'}<br><small>${g.district}</small></td>
                    <td style="padding: 1rem;"><span style="background: var(--bg-light); padding: 0.3rem 0.8rem; border-radius: 50px; font-size: 0.8rem;">${g.membersCount || 0}</span></td>
                    <td style="padding: 1rem;">${g.leader}<br><small>${g.leaderMobile}</small></td>
                `;
                tableBody.appendChild(tr);
            });

            if (groups.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="5" style="padding: 3rem; text-align: center; color: #999;">No groups found in the system.</td></tr>';
            }
        }

        loadGroups();
    </script>
</body>
</html>
