<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Programs | Sakhi Care Admin</title>
    <link rel="stylesheet" href="../css/index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { display: flex; background: #f0f2f5; }
        .sidebar { width: 280px; height: 100vh; background: #1a1a1a; color: white; padding: 2rem; position: fixed; }
        .main-content { margin-left: 280px; width: calc(100% - 280px); padding: 3rem; }
        .sidebar-links { list-style: none; margin-top: 3rem; }
        .sidebar-links a { color: #ccc; text-decoration: none; display: flex; align-items: center; gap: 1rem; padding: 0.8rem 1rem; border-radius: 10px; }
        .sidebar-links a.active { background: var(--primary); color: white; }
        .form-card { background: white; padding: 2rem; border-radius: 20px; box-shadow: var(--shadow-sm); margin-bottom: 3rem; display: none; }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 0.8rem; border-radius: 10px; border: 1px solid #ddd; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo"><i class="fas fa-heart"></i> SAKHI ADMIN</div>
        <ul class="sidebar-links">
            <li><a href="index.html"><i class="fas fa-chart-line"></i> Dashboard</a></li>
            <li><a href="programs.html" class="active"><i class="fas fa-tasks"></i> Programs</a></li>
            <li><a href="applications.html"><i class="fas fa-user-tie"></i> Applications</a></li>
            <li><a href="groups.html"><i class="fas fa-users"></i> Groups</a></li>
            <li><a href="products.html"><i class="fas fa-box"></i> Products</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 3rem;">
            <h1>Program Management</h1>
            <button onclick="toggleForm()" class="btn btn-primary"><i class="fas fa-plus"></i> Add New Program</button>
        </div>

        <div id="add-program-form" class="form-card">
            <h2 style="margin-bottom: 2rem;">Add New Program</h2>
            <form onsubmit="handleProgramSubmit(event)">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
                    <div class="form-group">
                        <label>Program Title</label>
                        <input type="text" name="title" required placeholder="e.g. Health Awareness">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select name="category">
                            <option>Health</option>
                            <option>Employment</option>
                            <option>MSME</option>
                            <option>Skill Training</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Short Description</label>
                    <textarea name="shortDesc" rows="2" required placeholder="One line summary"></textarea>
                </div>
                <div class="form-group">
                    <label>Image URL (or placeholder)</label>
                    <input type="text" name="image" placeholder="assets/images/placeholder.png">
                </div>
                <div style="display: flex; gap: 1rem; justify-content: flex-end;">
                    <button type="button" onclick="toggleForm()" class="btn btn-outline">Cancel</button>
                    <button type="submit" class="btn btn-primary">Create Program</button>
                </div>
            </form>
        </div>

        <div class="glass" style="padding: 2rem; border-radius: 20px;">
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="text-align: left; border-bottom: 2px solid #eee;">
                        <th style="padding: 1rem;">Program Name</th>
                        <th style="padding: 1rem;">Category</th>
                        <th style="padding: 1rem;">Status</th>
                        <th style="padding: 1rem;">Actions</th>
                    </tr>
                </thead>
                <tbody id="programs-table-body">
                    <!-- Loaded via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { db } from '../js/db.js';

        const tableBody = document.getElementById('programs-table-body');
        const form = document.getElementById('add-program-form');

        window.toggleForm = function() {
            form.style.display = form.style.display === 'block' ? 'none' : 'block';
        }

        window.handleProgramSubmit = function(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const data = Object.fromEntries(formData.entries());
            
            data.status = 'Active';
            data.content = { about: '', problem: '', solution: '', activities: [] }; // Defaults
            
            db.addProgram(data);
            alert('Program added successfully!');
            location.reload();
        }

        function loadPrograms() {
            const programs = db.getPrograms();
            tableBody.innerHTML = '';
            programs.forEach(p => {
                const tr = document.createElement('tr');
                tr.style.borderBottom = '1px solid #eee';
                tr.innerHTML = `
                    <td style="padding: 1rem; font-weight: 600;">${p.title}</td>
                    <td style="padding: 1rem;">${p.category}</td>
                    <td style="padding: 1rem;"><span style="background: #e8f5e9; color: #2e7d32; padding: 0.3rem 0.8rem; border-radius: 50px; font-size: 0.8rem;">${p.status}</span></td>
                    <td style="padding: 1rem; display: flex; gap: 0.5rem;">
                        <button class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.8rem;"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.8rem; border-color: #ff5252; color: #ff5252;"><i class="fas fa-trash"></i></button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        }

        loadPrograms();
    </script>
</body>
</html>
